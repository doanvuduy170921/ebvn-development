services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 50M
    networks:
      - app-network

  bookmark-service:
    image: duydoanvu1709/go-api:latest
    container_name: bookmark-service
    restart: always
    depends_on:
      - redis
    env_file:
      - ./bookmark_service/.env
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health-check"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 120M

  frontend:
    image: duydoanvu1709/snappy-fe:latest
    container_name: frontend
    restart: always
    deploy:
      resources:
        limits:
          memory: 50M
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      # Nginx tổng chỉ khởi động khi cả FE đã UP và Go API đã vượt qua kiểm tra Healthcheck
      bookmark-service:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - app-network

networks:
  app-network:
    driver: bridge