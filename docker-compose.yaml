services:
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - app-network

  bookmark-service:
    image: duydoanvu1709/go-api:latest
    container_name: bookmark-service
    depends_on:
      - redis
    env_file:
      - ./bookmark_service/.env
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health-check"]
      interval: 5s
      timeout: 3s
      retries: 5


  frontend:
    image: duydoanvu1709/snappy-fe:latest
    container_name: frontend
    restart: always
    deploy:
      resources:
        limits:
          memory: 60M
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:z
    depends_on:
      bookmark-service:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - app-network

networks:
  app-network:
    driver: bridge